<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="100%" height="100%">
  <defs>
    <!-- Clip path to keep stripes within the circular boundary -->
    <clipPath id="circle-clip">
      <circle cx="50" cy="50" r="40" />
    </clipPath>
  </defs>
  
  <!-- Icon Group -->
  <g class="logo-icon">
    <!-- Solid Left Part (with chevron boundary) -->
    <path d="M 50,10 A 40,40 0 0,0 50,90 L 65,50 Z" fill="#00C800" />
    
    <!-- Striped Right Part (clipped by the circle, with chevron gap) -->
    <g clip-path="url(#circle-clip)">
      <rect x="55.5" y="14" width="40" height="4" fill="#00C800" />
      <rect x="58.5" y="22" width="40" height="4" fill="#00C800" />
      <rect x="61.5" y="30" width="40" height="4" fill="#00C800" />
      <rect x="64.5" y="38" width="40" height="4" fill="#00C800" />
      <rect x="67.5" y="46" width="40" height="4" fill="#00C800" />
      <rect x="67.5" y="54" width="40" height="4" fill="#00C800" />
      <rect x="64.5" y="62" width="40" height="4" fill="#00C800" />
      <rect x="61.5" y="70" width="40" height="4" fill="#00C800" />
      <rect x="58.5" y="78" width="40" height="4" fill="#00C800" />
      <rect x="55.5" y="86" width="40" height="4" fill="#00C800" />
    </g>
  </g>
  
  <!-- Text Group -->
  <g class="logo-text">
    <!-- Large Bold Italic brand name -->
    <text x="110" y="62" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="900" font-style="italic" font-size="54" fill="#00C800" letter-spacing="-1">ELLIES</text>
    <!-- Subtitle aligned underneath -->
    <text x="170" y="88" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="800" font-style="italic" font-size="20" fill="#00C800" letter-spacing="5">LOGISTICS</text>
  </g>
</svg>
